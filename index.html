<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hello World</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --primary: #845ec2;
      --secondary: #2c73d2;
      --bg: #e7f3f8;
    }

    body {
      font-family: 'Inter', sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      background: var(--bg);
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 2rem;
      height: 64px;
      background: var(--primary);
    }

    .logo {
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: -0.5px;
      color: #fff;
    }

    .header-buttons {
      display: flex;
      gap: 0.75rem;
    }

    .btn {
      padding: 0.5rem 1.25rem;
      border-radius: 6px;
      font-size: 0.95rem;
      cursor: pointer;
      border: none;
    }

    .btn-login {
      background: transparent;
      border: 1px solid #fff;
      color: #fff;
    }

    .btn-login:hover {
      background: rgba(255, 255, 255, 0.15);
    }

    .btn-signin {
      background: var(--secondary);
      color: #fff;
    }

    .btn-signin:hover {
      background: #2460b3;
    }

    main {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .hero {
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.5rem;
      padding: 2rem;
    }

    .hero h1 {
      font-size: 3.5rem;
      color: var(--primary);
      line-height: 1.15;
      max-width: 640px;
    }

    .hero p {
      font-size: 1.2rem;
      color: #555;
      max-width: 480px;
      line-height: 1.6;
    }

    .hero-actions {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
      justify-content: center;
    }

    .btn-primary {
      background: var(--primary);
      color: #fff;
      padding: 0.75rem 2rem;
      font-size: 1rem;
      border-radius: 8px;
      border: none;
      cursor: pointer;
    }

    .btn-primary:hover {
      background: #6d4aa8;
    }

    .btn-outline {
      background: transparent;
      color: var(--primary);
      padding: 0.75rem 2rem;
      font-size: 1rem;
      border-radius: 8px;
      border: 2px solid var(--primary);
      cursor: pointer;
    }

    .btn-outline:hover {
      background: var(--primary);
      color: #fff;
    }

    footer {
      background: var(--primary);
      color: #fff;
      padding: 2rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
    }

    .footer-nav {
      display: flex;
      gap: 2rem;
      flex-wrap: wrap;
      justify-content: center;
    }

    .footer-nav a {
      color: rgba(255, 255, 255, 0.8);
      text-decoration: none;
      font-size: 0.9rem;
    }

    .footer-nav a:hover {
      color: #fff;
    }

    .footer-copy {
      font-size: 0.8rem;
      color: rgba(255, 255, 255, 0.5);
    }
  </style>
</head>
<body>
  <header>
    <div class="logo">siteMe</div>
    <div class="header-buttons">
      <button class="btn btn-login">Login</button>
      <button class="btn btn-signin">Sign in</button>
    </div>
  </header>
  <main>
    <div class="hero">
      <h1>Build your personal site in minutes</h1>
      <p>siteMe gives you a beautiful, fast, and customizable home on the web — no coding required.</p>
      <div class="hero-actions">
        <button class="btn btn-primary">Get Started Free</button>
        <button class="btn btn-outline">See how it works</button>
      </div>
    </div>
  </main>
  <footer>
    <nav class="footer-nav">
      <a href="#">Home</a>
      <a href="#">About</a>
      <a href="#">Services</a>
      <a href="#">Blog</a>
      <a href="#">Careers</a>
      <a href="#">Contact</a>
    </nav>
    <p class="footer-copy">&copy; 2026 siteMe. All rights reserved.</p>
  </footer>
</body>
</html>
