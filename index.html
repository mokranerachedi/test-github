<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hello World</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --primary: #845ec2;
      --secondary: #2c73d2;
      --bg: #e7f3f8;
    }

    body {
      font-family: sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      background: var(--bg);
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 2rem;
      height: 64px;
      background: var(--primary);
    }

    .logo {
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: -0.5px;
      color: #fff;
    }

    .header-buttons {
      display: flex;
      gap: 0.75rem;
    }

    .btn {
      padding: 0.5rem 1.25rem;
      border-radius: 6px;
      font-size: 0.95rem;
      cursor: pointer;
      border: none;
    }

    .btn-login {
      background: transparent;
      border: 1px solid #fff;
      color: #fff;
    }

    .btn-login:hover {
      background: rgba(255, 255, 255, 0.15);
    }

    .btn-signin {
      background: var(--secondary);
      color: #fff;
    }

    .btn-signin:hover {
      background: #2460b3;
    }

    main {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    h1 {
      font-size: 6rem;
      color: var(--primary);
    }
  </style>
</head>
<body>
  <header>
    <div class="logo">siteMe</div>
    <div class="header-buttons">
      <button class="btn btn-login">Login</button>
      <button class="btn btn-signin">Sign in</button>
    </div>
  </header>
  <main>
    <h1>Hello World!</h1>
  </main>
</body>
</html>
